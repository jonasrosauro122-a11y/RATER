<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVA Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff4d00, #ff9900);
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    nav {
      background: #1a1a1a;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: orange;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 2em;
      color: #ff6600;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    footer {
      background: #111;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>🔥 LAVA Website</h1>
  <p>Welcome to your project site</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h2>Build. Create. Innovate.</h2>
  <p>This is your GitHub Pages website 🎉</p>
</section>

<section class="section">
  <h2>My Features</h2>

  <div class="card">
    <h3>⚡ Fast</h3>
    <p>Optimized performance</p>
  </div>

  <div class="card">
    <h3>🔥 Modern</h3>
    <p>Clean and responsive design</p>
  </div>

  <div class="card">
    <h3>🚀 Projects</h3>
    <p>Showcase your work</p>
  </div>

</section>

<footer>
  <p>© 2026 LAVA Website | Built with GitHub Pages</p>
</footer>

</body>
</html>
